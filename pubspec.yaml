name: dompetku
description: Aplikasi Catatan Keuangan Pribadi dengan Cubit dan SQLite

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # UI
  cupertino_icons: ^1.0.6
  intl: ^0.18.1
  fl_chart: ^0.66.2
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
